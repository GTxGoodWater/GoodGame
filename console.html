<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Terminal ChromeOS Flex - ACER</title>
<style>
    body {
        background: #000;
        color: #00ff66;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        overflow: hidden;
    }

    #header {
        background: #111;
        color: #fff;
        padding: 12px 20px;
        font-size: 20px;
        font-weight: bold;
        border-bottom: 2px solid #444;
    }

    #console {
        padding: 20px;
        height: calc(100vh - 180px);
        overflow-y: auto;
        font-size: 15px;
        white-space: pre-wrap;
        line-height: 1.4;
    }

    #inputBar {
        background: #111;
        padding: 10px 20px;
        border-top: 2px solid #444;
        display: flex;
        align-items: center;
        gap: 10px;
        position: fixed;
        bottom: 40px;
        width: 100%;
    }

    #cmd {
        background: #000;
        border: none;
        outline: none;
        color: #00ff66;
        font-family: Arial, sans-serif;
        font-size: 15px;
        width: 100%;
    }

    #footer {
        background: #111;
        color: #888;
        padding: 10px 20px;
        font-size: 14px;
        border-top: 2px solid #444;
        position: fixed;
        bottom: 0;
        width: 100%;
    }

    .error {
        color: #ff3333;
        font-weight: bold;
    }

    .bar {
        color: #00aaff;
        font-weight: bold;
    }
</style>
</head>
<body>

<div id="header">Terminal ChromeOS Flex – ACER</div>

<div id="console"></div>

<div id="inputBar">
    <span style="color:#00aaff;">[juandiego.lopez@a.vedrunapuertosantamaria.es]:</span>
    <input id="cmd" autocomplete="off" autofocus>
</div>

<div id="footer">Gestionado por: vedruna.es</div>

<script>
const consoleBox = document.getElementById("console");
const cmd = document.getElementById("cmd");

// Cola de mensajes
let queue = [];
let processing = false;

function timestamp() {
    const d = new Date();
    return `[${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}]`;
}

function enqueue(action) {
    queue.push(action);
    processQueue();
}

function processQueue() {
    if (processing || queue.length === 0) return;
    processing = true;

    const action = queue.shift();
    action(() => {
        processing = false;
        processQueue();
    });
}

function typeLine(text, colorClass = "", delay = 35) {
    return (done) => {
        let i = 0;
        const line = document.createElement("div");
        if (colorClass) line.classList.add(colorClass);
        consoleBox.appendChild(line);

        function typeChar() {
            if (i < text.length) {
                line.innerHTML += text.charAt(i);
                i++;
                consoleBox.scrollTop = consoleBox.scrollHeight;
                setTimeout(typeChar, delay);
            } else {
                setTimeout(done, 350);
            }
        }
        typeChar();
    };
}

// Barra de carga en cola con duraciones distintas
function loadingBar(label, steps = 12, speed = 120) {
    return (done) => {
        let progress = 0;
        const line = document.createElement("div");
        line.classList.add("bar");
        consoleBox.appendChild(line);

        function update() {
            if (progress <= steps) {
                line.innerHTML = `${label} [${"#".repeat(progress)}${" ".repeat(steps - progress)}] ${Math.floor((progress/steps)*100)}%`;
                consoleBox.scrollTop = consoleBox.scrollHeight;
                progress++;
                setTimeout(update, speed);
            } else {
                setTimeout(done, 300);
            }
        }
        update();
    };
}

let stage = 0;

function startSequence() {
    enqueue(typeLine(`${timestamp()} Inicializando entorno de supresión organizativa...`));
    enqueue(loadingBar("Cargando módulos", 14, 140));
    enqueue(typeLine(`${timestamp()} Verificando estado de inscripción en dominio vedruna.es...`));
    enqueue(typeLine(`${timestamp()} Resultado: INSCRIPCIÓN BLOQUEADA`, "error"));
    enqueue(typeLine(`${timestamp()} Intentando forzar desinscripción...`));
    enqueue(typeLine(`${timestamp()} ERROR: Permisos insuficientes para ejecutar la operación.`, "error"));
    enqueue(typeLine(`${timestamp()} ¿Desea continuar con el procedimiento avanzado? [Y/N]`));
}

startSequence();

cmd.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        const input = cmd.value.trim().toUpperCase();
        enqueue(typeLine(`[juandiego.lopez@a.vedrunapuertosantamaria.es]: ${input}`));
        cmd.value = "";

        // ETAPA 0
        if (stage === 0) {
            if (input !== "Y" && input !== "N") {
                enqueue(typeLine(`${timestamp()} ERROR: Su envío no contiene información útil. Inténtelo de nuevo.`,"error"));
                return;
            }
            if (input === "N") {
                enqueue(typeLine(`${timestamp()} ERROR: Los mensajes de la terminal no llegaron al servidor, se seguirá automáticamente.`,"error"));
            }
            enqueue(typeLine(`${timestamp()} Preparando operación avanzada...`));
            enqueue(loadingBar("Analizando parámetros", 10, 160));
            enqueue(typeLine(`${timestamp()} Esta acción ejecutará:`));
            enqueue(typeLine(`· Sobrescritura de políticas de dominio`));
            enqueue(typeLine(`· Intento de elevación de privilegios`));
            enqueue(typeLine(`· Análisis profundo de integridad`));
            enqueue(typeLine(`${timestamp()} ¿Confirmar operación? [Y/N]`));
            stage = 1;
        }

        // ETAPA 1
        else if (stage === 1) {
            if (input !== "Y" && input !== "N") {
                enqueue(typeLine(`${timestamp()} ERROR: Su envío no contiene información útil. Inténtelo de nuevo.`,"error"));
                return;
            }
            if (input === "N") {
                enqueue(typeLine(`${timestamp()} ERROR: Los mensajes de la terminal no llegaron al servidor, se seguirá automáticamente.`,"error"));
            }
            enqueue(typeLine(`${timestamp()} Ejecutando operación avanzada...`));
            enqueue(loadingBar("Procesando", 16, 100));
            enqueue(typeLine(`${timestamp()} ERROR: Escalada de privilegios rechazada.`, "error"));
            enqueue(typeLine(`${timestamp()} Intentando método alternativo...`));
            enqueue(typeLine(`${timestamp()} Esta acción realizará:`));
            enqueue(typeLine(`· Análisis de procesos en ejecución`));
            enqueue(typeLine(`· Detección de módulos no autorizados`));
            enqueue(typeLine(`· Activación de protocolo de aislamiento`));
            enqueue(typeLine(`${timestamp()} ¿Proceder? [Y/N]`));
            stage = 2;
        }

        // ETAPA 2
        else if (stage === 2) {
            if (input !== "Y" && input !== "N") {
                enqueue(typeLine(`${timestamp()} ERROR: Su envío no contiene información útil. Inténtelo de nuevo.`,"error"));
                return;
            }
            if (input === "N") {
                enqueue(typeLine(`${timestamp()} ERROR: Los mensajes de la terminal no llegaron al servidor, se seguirá automáticamente.`,"error"));
            }
            enqueue(typeLine(`${timestamp()} Iniciando análisis profundo...`));
            enqueue(loadingBar("Escaneando procesos", 18, 90));
            enqueue(typeLine(`${timestamp()} Analizando integridad de módulos del sistema...`));
            enqueue(typeLine(`${timestamp()} ADVERTENCIA: Proceso no identificado detectado.`, "error"));
            enqueue(loadingBar("Intentando obtener metadatos", 12, 150));
            enqueue(typeLine(`${timestamp()} ERROR: El proceso no coincide con ninguna firma conocida.`, "error"));
            enqueue(typeLine(`${timestamp()} Nombre del proceso: 000.exe`, "error"));
            enqueue(typeLine(`${timestamp()} Estado: EJECUCIÓN INICIADA`, "error"));
            enqueue(typeLine(`${timestamp()} *** SIMULACIÓN COMPLETADA: No se ha ejecutado ningún archivo real. ***`));
            stage = 3;
        }

        else {
            enqueue(typeLine(`${timestamp()} El sistema está procesando 000.exe (simulación).`));
        }
    }
});
</script>

</body>
</html>
