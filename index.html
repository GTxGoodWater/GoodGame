<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GoodFire Desktop</title>

<!-- Fuentes -->
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&family=Lilita+One&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: url('https://wallpapercave.com/wp/wp9637542.jpg');
    background-size: cover;
    background-position: center;
    font-family: "Lexend", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .desktop {
    text-align: center;
    backdrop-filter: blur(6px);
    padding: 40px;
    border-radius: 20px;
  }

  h1 {
    font-family: "Lilita One", cursive;
    font-size: 70px;
    color: white;
    margin-bottom: 40px;
    text-shadow: 0 4px 10px rgba(0,0,0,0.4);
  }

  .apps {
    display: flex;
    justify-content: center;
    gap: 60px;
  }

  .app {
    width: 150px;
    height: 150px;
    background: rgba(255,255,255,0.25);
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.25s;
    border: 2px solid rgba(255,255,255,0.4);
    backdrop-filter: blur(4px);
  }

  .app:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.35);
    border-color: white;
  }

  .app-icon {
    font-size: 55px;
    margin-bottom: 10px;
  }

  .app-name {
    font-size: 18px;
    font-weight: 600;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>

<div class="desktop">
  <h1>GoodFire Desktop</h1>

  <div class="apps">

    <!-- APP 1: SHOOTOUT -->
    <div class="app" onclick="location.href='ShootOut.html'">
      <div class="app-icon">🎮</div>
      <div class="app-name">ShootOut</div>
    </div>

    <!-- APP 2: GGCRAFT -->
    <div class="app" onclick="location.href='GGCraft.html'">
      <div class="app-icon">🧱</div>
      <div class="app-name">GGCraft</div>
    </div>

  </div>
</div>

</body>
</html>
