<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SolarisGG</title>

<!-- Fuentes -->
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&family=Lilita+One&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #dbeafe, #eef2ff);
    font-family: "Lexend", sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .desktop {
    width: 90%;
    max-width: 900px;
    text-align: center;
  }

  h1 {
    font-family: "Lilita One", cursive;
    font-size: 60px;
    color: #1e3a8a;
    margin-bottom: 40px;
    text-shadow: 0 3px 6px rgba(0,0,0,0.15);
  }

  .apps {
    display: flex;
    justify-content: center;
    gap: 60px;
  }

  .app {
    width: 150px;
    height: 150px;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.25s;
    border: 2px solid #e2e8f0;
  }

  .app:hover {
    transform: scale(1.08);
    box-shadow: 0 14px 35px rgba(0,0,0,0.25);
    border-color: #3b82f6;
  }

  .app-icon {
    font-size: 50px;
    margin-bottom: 10px;
  }

  .app-name {
    font-size: 18px;
    font-weight: 600;
    color: #1e293b;
  }
</style>
</head>
<body>

<div class="desktop">
  <h1>SolarisGG</h1>

  <div class="apps">

    <!-- APP 1 -->
    <div class="app" onclick="location.href='ShootOut.html'">
      <div class="app-icon">🎮</div>
      <div class="app-name">ShootOut</div>
    </div>

    <!-- APP 2 -->
    <div class="app" onclick="location.href='app2.html'">
      <div class="app-icon">🧩</div>
      <div class="app-name">App 2</div>
    </div>

  </div>
</div>

</body>
</html>
